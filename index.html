<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Name Roller</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Mono:wght@300;400&family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Uncial+Antiqua&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#f0eeeb;--surface:#fff;--border:#dddbd7;--text:#1c1a17;--muted:#999690;
  --accent:#1c1a17;--book-bg:#faf8f4;--book-border:#e8e4de;
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.22,1,.36,1);
}

html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;-webkit-font-smoothing:antialiased}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:40px 24px 28px}

/* ── HEADER ── */
header{text-align:center;margin-bottom:40px;animation:fade-up .6s var(--ease-out) both}
.eyebrow{font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
h1{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:48px;letter-spacing:.04em;line-height:1}

@keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}

/* ── STREAK ── */
.streak-row{
  width:100%;max-width:440px;margin-bottom:8px;
  display:flex;align-items:center;gap:10px;height:20px;
  opacity:0;transition:opacity .4s ease;
}
.streak-row.visible{opacity:1}
.streak-label{font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.streak-pips{display:flex;gap:5px;align-items:center}
.pip{
  width:8px;height:8px;border-radius:50%;
  border:1px solid var(--border);background:var(--surface);
  transition:background .25s,border-color .25s,box-shadow .25s,transform .2s;
}
.pip.lit-uncommon{background:#4a7a4a;border-color:#4a7a4a;box-shadow:0 0 6px rgba(74,122,74,.65)}
.pip.lit-rare    {background:#3a5a8a;border-color:#3a5a8a;box-shadow:0 0 8px rgba(58,90,138,.7)}
.pip.lit-legendary{background:#c8960a;border-color:#c8960a;box-shadow:0 0 10px rgba(200,150,10,.85)}
.pip.lit-mythic  {background:linear-gradient(135deg,#ff40ff,#8040ff);border-color:#c040ff;box-shadow:0 0 12px rgba(192,64,255,.9)}
.pip.lit-cursed  {background:#8b0000;border-color:#8b0000;box-shadow:0 0 8px rgba(180,0,0,.8)}
.pip.popping     {animation:pip-pop .3s var(--ease-spring) forwards}
@keyframes pip-pop{0%{transform:scale(1)}50%{transform:scale(1.6)}100%{transform:scale(1)}}
.streak-bonus{font-size:9px;letter-spacing:.1em;color:#c8960a;transition:opacity .3s,transform .3s;white-space:nowrap}

/* ── CARD ── */
.card{
  background:var(--surface);border:1px solid var(--border);border-radius:5px;
  width:100%;max-width:440px;padding:48px 40px;text-align:center;
  margin-bottom:12px;min-height:210px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:16px;
  box-shadow:0 2px 20px rgba(0,0,0,.05);position:relative;overflow:hidden;
  transition:box-shadow .6s ease,border-color .5s ease;
  animation:fade-up .6s var(--ease-out) .08s both;
}
.card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.55) 0%,transparent 55%);
  pointer-events:none;
}
/* idle pulse */
.card.idle-pulse{animation:card-idle 6s ease-in-out infinite}
@keyframes card-idle{0%,100%{box-shadow:0 2px 20px rgba(0,0,0,.05)}50%{box-shadow:0 4px 28px rgba(0,0,0,.08)}}

.card.rarity-uncommon{box-shadow:0 0 30px rgba(74,122,74,.14),0 2px 16px rgba(0,0,0,.04);border-color:#b8d4b8}
.card.rarity-rare    {box-shadow:0 0 44px rgba(58,90,138,.2),0 2px 16px rgba(0,0,0,.04);border-color:#aac0e0}
.card.rarity-legendary{border-color:transparent;box-shadow:0 0 60px rgba(200,140,20,.38),0 0 120px rgba(180,100,200,.18);animation:leg-card 3s ease-in-out infinite}
.card.rarity-mythic  {border-color:transparent;animation:mythic-card 2.5s ease-in-out infinite}
.card.rarity-cursed  {border-color:#4a0a0a;box-shadow:0 0 44px rgba(180,0,0,.28),0 0 80px rgba(80,0,0,.14);animation:cursed-card 4s ease-in-out infinite}

@keyframes leg-card   {0%,100%{box-shadow:0 0 60px rgba(200,140,20,.38),0 0 120px rgba(180,100,200,.18)}50%{box-shadow:0 0 90px rgba(200,140,20,.6),0 0 180px rgba(180,100,200,.3)}}
@keyframes mythic-card{0%,100%{box-shadow:0 0 60px rgba(180,0,255,.42),0 0 120px rgba(255,0,180,.22)}50%{box-shadow:0 0 100px rgba(180,0,255,.72),0 0 200px rgba(255,0,180,.42)}}
@keyframes cursed-card{0%,100%{box-shadow:0 0 44px rgba(180,0,0,.28),0 0 80px rgba(80,0,0,.14)}50%{box-shadow:0 0 64px rgba(200,0,0,.44),0 0 120px rgba(120,0,0,.28)}}

.card.rarity-legendary::after{content:'';position:absolute;inset:-2px;border-radius:7px;background:linear-gradient(135deg,#f0c040,#e080ff,#60c0ff,#f0c040);background-size:300% 300%;animation:leg-border 4s linear infinite;z-index:-1}
.card.rarity-mythic::after   {content:'';position:absolute;inset:-2px;border-radius:7px;background:linear-gradient(135deg,#ff00ff,#8800ff,#ff00aa,#00aaff,#ff00ff);background-size:400% 400%;animation:mythic-border 2.5s linear infinite;z-index:-1}
.card.rarity-cursed::after   {content:'';position:absolute;inset:-1px;border-radius:6px;background:linear-gradient(135deg,#8b0000,#2a0000,#600000,#8b0000);background-size:300% 300%;animation:cursed-border 6s linear infinite;z-index:-1}
@keyframes leg-border   {0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes mythic-border{0%{background-position:0% 50%}100%{background-position:400% 50%}}
@keyframes cursed-border{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

/* card top corners */
.roll-counter{position:absolute;top:12px;right:14px;font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.new-badge{position:absolute;top:11px;left:13px;font-size:8px;letter-spacing:.15em;text-transform:uppercase;padding:3px 9px;border-radius:2px;background:#1c1a17;color:#fff;opacity:0;transition:opacity .35s;pointer-events:none}
.new-badge.show{opacity:1}

/* ── RARITY BADGE ── */
.rarity-badge{font-size:9px;letter-spacing:.2em;text-transform:uppercase;padding:4px 14px;border-radius:2px;opacity:0;transform:translateY(-6px) scale(.95);transition:opacity .4s ease,transform .4s var(--ease-spring)}
.rarity-badge.visible{opacity:1;transform:translateY(0) scale(1)}

/* ── RESULT NAME ── */
.result-name{
  font-family:'Cormorant Garamond',serif;font-size:52px;font-weight:300;
  letter-spacing:.02em;color:var(--text);line-height:1.1;position:relative;
  max-width:100%;word-break:break-word;
}
.result-name.idle{font-size:18px;font-family:'DM Mono',monospace;font-weight:300;color:var(--muted);letter-spacing:.1em}

/* slot spin — decelerating phases controlled by JS class swaps */
.result-name.spin-fast {animation:slot-fast .06s linear infinite}
.result-name.spin-mid  {animation:slot-mid  .1s  linear infinite}
.result-name.spin-slow {animation:slot-slow .18s linear infinite}
@keyframes slot-fast{0%{transform:translateY(0) scaleY(1);opacity:.85}25%{transform:translateY(-11px) scaleY(.75);opacity:.35}50%{transform:translateY(0) scaleY(1);opacity:.85}75%{transform:translateY(11px) scaleY(.75);opacity:.35}100%{transform:translateY(0) scaleY(1);opacity:.85}}
@keyframes slot-mid {0%{transform:translateY(0) scaleY(1);opacity:.9}25%{transform:translateY(-7px) scaleY(.85);opacity:.5}50%{transform:translateY(0) scaleY(1);opacity:.9}75%{transform:translateY(7px) scaleY(.85);opacity:.5}100%{transform:translateY(0) scaleY(1);opacity:.9}}
@keyframes slot-slow{0%{transform:translateY(0) scaleY(1);opacity:.95}25%{transform:translateY(-4px) scaleY(.92);opacity:.65}50%{transform:translateY(0) scaleY(1);opacity:.95}75%{transform:translateY(4px) scaleY(.92);opacity:.65}100%{transform:translateY(0) scaleY(1);opacity:.95}}

.result-name.landing{animation:name-pop .58s var(--ease-spring) forwards}
@keyframes name-pop{0%{transform:scale(.6) translateY(28px);opacity:0}55%{transform:scale(1.07) translateY(-4px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}

/* rarity name styles */
.result-name.rarity-uncommon{font-family:'Playfair Display',serif;font-style:italic;color:#3a7a3a;animation:name-pop .58s var(--ease-spring) forwards,unc-shimmer 3s ease-in-out infinite .6s}
@keyframes unc-shimmer{0%,100%{text-shadow:none}50%{text-shadow:0 0 26px rgba(60,130,60,.45),0 2px 8px rgba(60,130,60,.2)}}

.result-name.rarity-rare{font-family:'Cinzel',serif;font-weight:600;font-size:42px;color:#1e3d7a;letter-spacing:.08em;animation:name-pop .58s var(--ease-spring) forwards,rare-pulse 2.5s ease-in-out infinite .6s}
@keyframes rare-pulse{0%,100%{text-shadow:0 0 8px rgba(30,61,122,.12)}50%{text-shadow:0 0 22px rgba(30,61,122,.65),0 0 50px rgba(60,100,200,.22)}}

.result-name.rarity-legendary{font-family:'Cinzel',serif;font-weight:700;font-size:44px;letter-spacing:.1em;background:linear-gradient(90deg,#f0c040,#ff8c00,#ff4080,#c040f0,#4080ff,#00c8f0,#40f090,#f0c040);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:name-pop .58s var(--ease-spring) forwards,leg-rainbow 3.5s linear infinite .6s}
@keyframes leg-rainbow{0%{background-position:0% 50%}100%{background-position:300% 50%}}

.result-name.rarity-mythic{font-family:'Cinzel',serif;font-weight:700;font-size:44px;letter-spacing:.12em;background:linear-gradient(90deg,#ff00ff,#cc00ff,#8800ff,#ff00cc,#ff44ff,#cc00ff,#ff00ff);background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:name-pop .58s var(--ease-spring) forwards,mythic-rainbow 2s linear infinite .6s,mythic-warp .9s ease-in-out infinite .6s}
@keyframes mythic-rainbow{0%{background-position:0% 50%}100%{background-position:300% 50%}}
@keyframes mythic-warp{0%,100%{letter-spacing:.12em}50%{letter-spacing:.2em}}

.result-name.rarity-cursed{font-family:'Uncial Antiqua',cursive;font-size:44px;color:#cc0000;letter-spacing:.06em;animation:name-pop .58s var(--ease-spring) forwards,cursed-flicker 4.5s ease-in-out infinite .6s}
@keyframes cursed-flicker{
  0%,100%{text-shadow:0 0 10px rgba(200,0,0,.4),0 0 30px rgba(150,0,0,.18);color:#cc0000}
  18%{color:#880000;text-shadow:0 0 4px rgba(200,0,0,.18)}
  19%{color:#dd0000;text-shadow:0 0 22px rgba(220,0,0,.75)}
  38%{text-shadow:0 0 6px rgba(200,0,0,.28)}
  58%{text-shadow:0 0 20px rgba(200,0,0,.62)}
  78%{color:#aa0000}
}

/* ── PARTICLES ── */
.particle{position:absolute;pointer-events:none;animation:ptcl var(--dur,1s) ease-out forwards}
@keyframes ptcl{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

/* ── SCREEN FLASH ── */
.flash-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0}
.flash-overlay.legendary-flash{animation:flash-leg  .9s ease-out forwards}
.flash-overlay.mythic-flash   {animation:flash-mythic 1s ease-out forwards}
.flash-overlay.cursed-flash   {animation:flash-cursed 1.1s ease-out forwards}
@keyframes flash-leg   {0%{opacity:0}8% {opacity:.32;background:radial-gradient(ellipse at 50% 40%,rgba(255,200,60,.55),rgba(220,120,255,.28) 55%,transparent 80%)}100%{opacity:0}}
@keyframes flash-mythic{0%{opacity:0}7% {opacity:.45;background:radial-gradient(ellipse at 50% 40%,rgba(255,0,255,.65),rgba(100,0,255,.35) 55%,transparent 80%)}100%{opacity:0}}
@keyframes flash-cursed{0%{opacity:0}5% {opacity:.38;background:radial-gradient(ellipse at 50% 40%,rgba(200,0,0,.6),rgba(80,0,0,.28) 55%,transparent 80%)}55%{opacity:.12}100%{opacity:0}}

/* ripple on roll button click */
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.25);transform:scale(0);animation:ripple-out .5s ease-out forwards;pointer-events:none}
@keyframes ripple-out{to{transform:scale(4);opacity:0}}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:10px;width:100%;max-width:440px;animation:fade-up .6s var(--ease-out) .18s both}
.btn{flex:1;border:1px solid var(--border);border-radius:4px;padding:16px 20px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:background .15s,border-color .15s,box-shadow .15s,transform .1s;background:var(--surface);color:var(--text);position:relative;overflow:hidden}
.btn:active{transform:scale(.965)}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);flex:2}
.btn-secondary:hover{background:#f5f3f0}
.btn-secondary:active{background:#ece9e5}
.btn-icon{flex:0 0 50px;font-size:16px;padding:16px 0}

/* ── BUTTON STYLE THEMES ── */
.btn-primary.style-classic{background:#1c1a17;color:#fff;border-color:#1c1a17}
.btn-primary.style-classic:hover{background:#2e2c28}

.btn-primary.style-ember{background:#1a0800;border:1px solid #c84000;color:#ff8040;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.2em;box-shadow:0 0 18px rgba(200,64,0,.22),inset 0 0 30px rgba(200,64,0,.06);animation:ember-breathe 2.5s ease-in-out infinite}
.btn-primary.style-ember::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,120,40,.08),transparent);pointer-events:none}
@keyframes ember-breathe{0%,100%{box-shadow:0 0 18px rgba(200,64,0,.22),inset 0 0 30px rgba(200,64,0,.06)}50%{box-shadow:0 0 36px rgba(220,80,0,.52),inset 0 0 40px rgba(220,80,0,.12)}}
.btn-primary.style-ember:hover{background:#220a00;color:#ffaa60}

.btn-primary.style-frost{background:linear-gradient(135deg,#e8f4ff,#d0e8ff);border:1px solid #90c4e8;color:#1a3a5a;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:300;letter-spacing:.2em;box-shadow:0 2px 20px rgba(144,196,232,.28);animation:frost-drift 5s ease-in-out infinite}
@keyframes frost-drift{0%,100%{background:linear-gradient(135deg,#e8f4ff,#d0e8ff)}50%{background:linear-gradient(135deg,#d8ecff,#c0dcff)}}
.btn-primary.style-frost:hover{box-shadow:0 4px 30px rgba(144,196,232,.5)}

.btn-primary.style-void{background:#000;border:1px solid #2a0040;color:rgba(220,160,255,.9);letter-spacing:.25em;animation:void-breathe 3s ease-in-out infinite}
.btn-primary.style-void::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 150%,rgba(140,0,255,.22),transparent 70%);pointer-events:none;animation:void-glow 3s ease-in-out infinite}
@keyframes void-breathe{0%,100%{box-shadow:0 0 8px rgba(140,0,255,.18),inset 0 0 20px rgba(140,0,255,.03)}50%{box-shadow:0 0 26px rgba(140,0,255,.52),inset 0 0 40px rgba(140,0,255,.08)}}
@keyframes void-glow{0%,100%{opacity:.4}50%{opacity:1}}
.btn-primary.style-void:hover{background:#0a0015;color:#f0c0ff}

.btn-primary.style-forge{background:linear-gradient(180deg,#2a1a0a,#1a0e04);border:1px solid #8a6020;color:#d4a040;font-family:'Cinzel',serif;font-size:10px;letter-spacing:.25em;box-shadow:0 3px 0 #4a2e0a,0 4px 14px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,200,80,.1)}
.btn-primary.style-forge:hover{transform:translateY(-1px);box-shadow:0 4px 0 #4a2e0a,0 6px 18px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,200,80,.15)}
.btn-primary.style-forge:active{transform:translateY(2px)!important;box-shadow:0 1px 0 #4a2e0a,0 2px 6px rgba(0,0,0,.3)}

.btn-primary.style-storm{background:#080c14;border:1px solid #4060a0;color:#80aaff;overflow:hidden}
.btn-primary.style-storm::before{content:'';position:absolute;inset:0;opacity:0;background:linear-gradient(90deg,transparent,rgba(100,150,255,.32),transparent);animation:storm-bolt 3.5s ease-in-out infinite}
@keyframes storm-bolt{0%,65%,100%{opacity:0;transform:translateX(-100%)}68%{opacity:1;transform:translateX(-70%)}71%{opacity:.25;transform:translateX(10%)}74%{opacity:.9;transform:translateX(80%)}77%{opacity:0;transform:translateX(110%)}}
.btn-primary.style-storm:hover{background:#0c1220;box-shadow:0 0 22px rgba(80,120,220,.32)}

.btn-primary.style-blood{background:linear-gradient(180deg,#1a0000,#0d0000);border:1px solid #660000;color:#cc3030;font-family:'Uncial Antiqua',cursive;font-size:12px;animation:blood-pulse 4s ease-in-out infinite}
@keyframes blood-pulse{0%,100%{box-shadow:0 0 8px rgba(180,0,0,.18),inset 0 0 20px rgba(180,0,0,.04)}50%{box-shadow:0 0 26px rgba(200,0,0,.48),inset 0 0 30px rgba(180,0,0,.1)}}
.btn-primary.style-blood:hover{background:linear-gradient(180deg,#220000,#110000);color:#ee4040}

.btn-primary.style-prismatic{background:#000;border:none;color:#fff;letter-spacing:.2em;overflow:hidden}
.btn-primary.style-prismatic::before{content:'';position:absolute;inset:-2px;z-index:0;border-radius:5px;background:linear-gradient(90deg,#ff0000,#ffaa00,#00ff88,#0088ff,#aa00ff,#ff0000);background-size:400% 100%;animation:prism-rotate 2s linear infinite}
.btn-primary.style-prismatic::after{content:'ROLL';position:absolute;inset:1px;z-index:1;border-radius:3px;background:#000;display:flex;align-items:center;justify-content:center;font-size:11px;letter-spacing:.2em;font-family:'DM Mono',monospace;color:#fff;line-height:1;padding-top:1px}
@keyframes prism-rotate{0%{background-position:0% 50%}100%{background-position:400% 50%}}

/* ── HISTORY TRAY ── */
.history-tray{
  width:100%;max-width:440px;display:flex;gap:5px;align-items:center;
  margin-bottom:10px;min-height:26px;
  animation:fade-up .6s var(--ease-out) .22s both;
}
.hist-chip{
  font-size:8px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 10px;border-radius:2px;border:1px solid var(--border);
  background:var(--surface);color:var(--muted);
  transition:all .25s ease;white-space:nowrap;
  animation:chip-in .3s var(--ease-spring) both;
}
@keyframes chip-in{from{opacity:0;transform:scale(.8) translateY(4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.hist-chip.rarity-uncommon{border-color:#b8d4b8;color:#3a7a3a;background:#f6fcf6}
.hist-chip.rarity-rare    {border-color:#9ab8e0;color:#1e3d7a;background:#f4f8ff;font-family:'Cinzel',serif}
.hist-chip.rarity-legendary{border-color:#c8960a;background:linear-gradient(90deg,#f0c040,#e080ff,#60c0ff,#f0c040);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:chip-in .3s var(--ease-spring) both,leg-rainbow 4s linear infinite;font-family:'Cinzel',serif}
.hist-chip.rarity-mythic  {border-color:#aa00cc;background:linear-gradient(90deg,#ff00ff,#8800ff,#ff00aa,#ff00ff);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:chip-in .3s var(--ease-spring) both,mythic-rainbow 2s linear infinite;font-family:'Cinzel',serif}
.hist-chip.rarity-cursed  {border-color:#660000;color:#cc0000;background:#1a0000;font-family:'Uncial Antiqua',cursive;font-size:9px}
@keyframes leg-rainbow  {0%{background-position:0% 50%}100%{background-position:200% 50%}}
@keyframes mythic-rainbow{0%{background-position:0% 50%}100%{background-position:200% 50%}}

/* ── BELOW BUTTONS ── */
.sub-row{display:flex;gap:8px;width:100%;max-width:440px;margin-top:10px;animation:fade-up .6s var(--ease-out) .28s both}
.sub-btn{flex:1;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);cursor:pointer;background:none;border:1px solid var(--border);border-radius:3px;padding:7px 12px;font-family:'DM Mono',monospace;transition:all .15s}
.sub-btn:hover{color:var(--text);border-color:var(--text);background:rgba(0,0,0,.02)}

/* ── SAVE STATUS ── */
.save-status{font-size:9px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;text-align:center;margin-top:8px;height:14px;transition:color .3s}
.save-status.saving{color:#888}.save-status.saved{color:#4a7a4a}.save-status.error{color:#aa4444}

/* ── OVERLAYS ── */
.overlay{
  position:fixed;inset:0;background:rgba(20,18,14,.65);
  backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;
  z-index:100;opacity:0;pointer-events:none;
  transition:opacity .28s ease;
}
.overlay.open{opacity:1;pointer-events:all}
.overlay > *{
  transform:scale(.96) translateY(8px);
  transition:transform .32s var(--ease-spring);
}
.overlay.open > *{transform:scale(1) translateY(0)}

/* ── BOOK ── */
.book{width:700px;max-width:96vw;height:560px;max-height:90vh;position:relative;perspective:1400px}

.book-cover{
  position:absolute;inset:0;background:#1c1a17;border-radius:2px 6px 6px 2px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  box-shadow:-6px 0 0 #111,0 0 0 1px rgba(255,255,255,.04) inset,8px 8px 40px rgba(0,0,0,.5);
  z-index:10;cursor:pointer;
  transition:transform .65s cubic-bezier(.4,0,.2,1);
  transform-origin:left center;transform-style:preserve-3d;
}
.book-cover::before{
  content:'';position:absolute;left:18px;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,#2a2826,#3a3632,#2a2826,#3a3632,#2a2826);
  border-radius:0 1px 1px 0;
}
.book-cover.opened{transform:rotateY(-160deg);pointer-events:none}
.bc-title{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:300;color:#e8e4dc;letter-spacing:.1em}
.bc-sub  {font-size:9px;letter-spacing:.3em;text-transform:uppercase;color:#555}
.bc-line {width:60px;height:1px;background:linear-gradient(90deg,transparent,#444,transparent)}
.bc-tap  {position:absolute;bottom:22px;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#444}

.book-pages{position:absolute;inset:0;background:var(--book-bg);border-radius:2px 6px 6px 2px;box-shadow:-6px 0 0 #e0ddd8,8px 8px 40px rgba(0,0,0,.28);display:flex;flex-direction:column;overflow:hidden}
.book-header{padding:22px 32px 16px;border-bottom:1px solid var(--book-border);display:flex;align-items:baseline;justify-content:space-between;flex-shrink:0}
.book-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:.05em}
.book-close{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#aaa;cursor:pointer;background:none;border:none;font-family:'DM Mono',monospace;transition:color .15s}
.book-close:hover{color:#333}
.book-tabs{display:flex;border-bottom:1px solid var(--book-border);padding:0 28px;flex-shrink:0;overflow-x:auto;gap:0;scrollbar-width:none}
.book-tabs::-webkit-scrollbar{display:none}
.tab-btn{font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:#bbb;background:none;border:none;border-bottom:2px solid transparent;padding:10px 11px;cursor:pointer;font-family:'DM Mono',monospace;transition:color .18s,border-color .18s;margin-bottom:-1px;white-space:nowrap}
.tab-btn:hover{color:#777}
.tab-btn.active{color:#1c1a17;border-bottom-color:#1c1a17}
.page-wrap{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;padding:18px 28px 24px;transform-origin:left center;transition:transform .42s cubic-bezier(.4,0,.2,1),opacity .28s ease}
.page.exit-left {transform:rotateY(-88deg) translateX(-16px);opacity:0;pointer-events:none}
.page.enter-right{transform:rotateY(28deg);opacity:0;pointer-events:none}
.page.visible   {transform:rotateY(0deg);opacity:1}

.rarity-section-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid #ece8e2}
.names-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:16px}
.name-entry{
  padding:7px 9px;border-radius:3px;font-size:13px;
  font-family:'Cormorant Garamond',serif;font-weight:400;letter-spacing:.03em;
  background:#f3f0eb;border:1px solid #e8e4de;
  transition:background .18s,border-color .18s,transform .15s;cursor:default;
}
.name-entry:hover{transform:scale(1.02)}
.name-entry.not-collected{color:#ccc;background:#f7f5f2;border-color:#edeae6}
.name-entry.not-collected:hover{transform:none}
.name-entry.collected          {background:#fff;border-color:#d8d4ce;color:#2a2825}
.name-entry.collected.rarity-uncommon{color:#3a7a3a;border-color:#b8d4b8;background:#f2f9f2}
.name-entry.collected.rarity-rare    {color:#1e3d7a;border-color:#9ab8e0;background:#f0f5ff;font-family:'Cinzel',serif;font-size:11px}
.name-entry.collected.rarity-legendary{font-family:'Cinzel',serif;font-size:11px;font-weight:600;border:1px solid #c8960a;background:#fffbf0;background-clip:border-box;-webkit-text-fill-color:initial;background:linear-gradient(90deg,#f0c040,#e080ff,#60c0ff,#f0c040);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:leg-rainbow 4s linear infinite}
.name-entry.collected.rarity-mythic  {font-family:'Cinzel',serif;font-size:11px;font-weight:700;border:1px solid #aa00cc;background:linear-gradient(90deg,#ff00ff,#8800ff,#ff00aa,#ff00ff);background-size:200% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:mythic-rainbow 2s linear infinite}
.name-entry.collected.rarity-cursed  {font-family:'Uncial Antiqua',cursive;color:#aa0000;border-color:#660000;background:#160000;font-size:11px}

.book-footer{padding:12px 32px;border-top:1px solid var(--book-border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.book-count{font-size:10px;letter-spacing:.15em;color:#bbb;text-transform:uppercase}
.page-nav{display:flex;gap:8px}
.page-nav button{width:28px;height:28px;border:1px solid #ddd;background:none;border-radius:2px;cursor:pointer;font-size:12px;color:#999;display:flex;align-items:center;justify-content:center;transition:all .15s}
.page-nav button:hover{background:#f0ede8;color:#333}
.page-nav button:disabled{opacity:.22;cursor:default}

/* ── SHOP ── */
.shop{width:600px;max-width:96vw;max-height:92vh;background:var(--book-bg);border-radius:6px;box-shadow:0 24px 80px rgba(0,0,0,.45);display:flex;flex-direction:column;overflow:hidden}
.shop-header{padding:22px 28px 16px;border-bottom:1px solid var(--book-border);display:flex;align-items:baseline;justify-content:space-between;flex-shrink:0;background:#1c1a17;color:#e8e4dc}
.shop-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;letter-spacing:.08em}
.shop-sub{font-size:9px;letter-spacing:.2em;color:#555;text-transform:uppercase;margin-top:3px}
.shop-close{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#555;cursor:pointer;background:none;border:none;font-family:'DM Mono',monospace;transition:color .15s}
.shop-close:hover{color:#ccc}
.shop-rollbar{padding:10px 28px;background:#f0eeeb;border-bottom:1px solid var(--book-border);font-size:10px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;display:flex;align-items:center;gap:8px}
.shop-rollbar span{color:var(--text);font-weight:500}
.shop-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:16px 24px;overflow-y:auto;flex:1}
.shop-item{border:1px solid var(--book-border);border-radius:4px;padding:14px;background:#fff;display:flex;flex-direction:column;gap:8px;position:relative;transition:border-color .2s,box-shadow .2s}
.shop-item:not(.locked):hover{box-shadow:0 4px 16px rgba(0,0,0,.07)}
.shop-item.locked{opacity:.5}
.shop-item.si-active{border-color:#1c1a17;box-shadow:0 0 0 1px #1c1a17}
.shop-preview{height:46px;border-radius:3px;overflow:hidden;display:flex;align-items:stretch}
.shop-preview .btn{width:100%;height:100%;border-radius:3px;pointer-events:none;font-size:9px}
.shop-name{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text)}
.shop-desc{font-size:8px;letter-spacing:.06em;color:var(--muted);line-height:1.5}
.shop-footer{display:flex;align-items:center;justify-content:space-between;margin-top:2px;gap:6px}
.shop-req{font-size:8px;letter-spacing:.08em;text-transform:uppercase;color:#bbb;flex:1;min-width:0}
.shop-btn{font-size:8px;letter-spacing:.12em;text-transform:uppercase;padding:5px 12px;border-radius:2px;cursor:pointer;border:1px solid var(--border);background:none;color:var(--text);font-family:'DM Mono',monospace;transition:all .15s;white-space:nowrap}
.shop-btn:hover:not(:disabled){background:#f0eeeb}
.shop-btn.sel{background:#1c1a17;color:#fff;border-color:#1c1a17}
.shop-btn:disabled{opacity:.28;cursor:default}
.lock-icon{position:absolute;top:8px;right:8px;font-size:11px;opacity:.35}
.prog-wrap{height:2px;background:#e8e4de;border-radius:2px;overflow:hidden;margin-top:3px}
.prog-fill{height:100%;background:linear-gradient(90deg,#888,#bbb);border-radius:2px;transition:width .6s var(--ease-out)}

/* ── CONSTELLATION ── */
.constellation-panel{width:680px;max-width:96vw;max-height:90vh;background:#08060e;border-radius:6px;box-shadow:0 0 80px rgba(100,60,200,.28),0 24px 80px rgba(0,0,0,.6);display:flex;flex-direction:column;overflow:hidden}
.const-header{padding:22px 32px 16px;border-bottom:1px solid #1c1828;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.const-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:#c8b8f0;letter-spacing:.1em}
.const-sub{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#3a364a;margin-top:3px}
.const-close{font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#3a364a;cursor:pointer;background:none;border:none;font-family:'DM Mono',monospace;transition:color .15s}
.const-close:hover{color:#888}
.const-body{flex:1;overflow-y:auto;padding:20px 28px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.const-group{border:1px solid #1c1828;border-radius:4px;padding:14px;background:#0c0a14;transition:border-color .4s,box-shadow .4s}
.const-group.complete{border-color:#6040c0;box-shadow:0 0 22px rgba(96,64,192,.22)}
.const-group-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;color:#9880c8;letter-spacing:.06em;margin-bottom:3px}
.const-progress-line{font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:#3a364a;margin-bottom:9px}
.const-group.complete .const-progress-line{color:#8060d0}
.const-mini-bar{height:2px;background:#1c1828;border-radius:1px;overflow:hidden;margin-bottom:10px}
.const-mini-fill{height:100%;background:linear-gradient(90deg,#4030a0,#9060e0);border-radius:1px;transition:width .5s var(--ease-out)}
.const-stars{display:flex;flex-wrap:wrap;gap:4px}
.const-star{font-size:9px;letter-spacing:.05em;padding:3px 7px;border-radius:2px;border:1px solid #1c1828;color:#2a2640;background:#0a0814;transition:all .35s;font-family:'Cormorant Garamond',serif}
.const-star.found{color:#b0a0e0;border-color:#3c2c90;background:#121028;text-shadow:0 0 8px rgba(160,140,230,.35)}
.const-star.found.new-find{animation:star-burst .5s var(--ease-spring)}
@keyframes star-burst{0%{transform:scale(1)}40%{transform:scale(1.4);background:#2a1860;color:#e0d4ff}100%{transform:scale(1)}}
.const-footer{padding:12px 32px;border-top:1px solid #1c1828;font-size:9px;letter-spacing:.15em;color:#3a364a;text-transform:uppercase;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.const-complete-badge{color:#8060d0}

/* ── TOAST ── */
.toast-container{position:fixed;top:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{
  background:#1c1a17;color:#e8e4dc;border-radius:4px;padding:11px 18px;
  font-size:9px;letter-spacing:.14em;text-transform:uppercase;
  box-shadow:0 6px 28px rgba(0,0,0,.4);
  animation:toast-in .32s var(--ease-spring) forwards;
  max-width:300px;border-left:3px solid #444;
}
.toast.out{animation:toast-out .28s ease forwards}
.toast.legendary-toast{background:#150e00;border-left-color:#c8960a;color:#f0c040}
.toast.mythic-toast   {background:#0e0014;border-left-color:#8800cc;color:#ee80ff}
.toast.cursed-toast   {background:#0e0000;border-left-color:#660000;color:#cc3030}
.toast.const-toast    {background:#060412;border-left-color:#6040c0;color:#b8a8e8}
.toast.milestone-toast{background:#0a100a;border-left-color:#4a7a4a;color:#88cc88}
@keyframes toast-in {from{transform:translateX(110%) scale(.85);opacity:0}to{transform:translateX(0) scale(1);opacity:1}}
@keyframes toast-out{from{transform:translateX(0) scale(1);opacity:1}to{transform:translateX(110%) scale(.85);opacity:0}}

/* ── SCROLLBARS ── */
.page::-webkit-scrollbar,.shop-grid::-webkit-scrollbar,.const-body::-webkit-scrollbar{width:3px}
.page::-webkit-scrollbar-thumb,.shop-grid::-webkit-scrollbar-thumb,.const-body::-webkit-scrollbar-thumb{background:#d8d4ce;border-radius:2px}
.page::-webkit-scrollbar-track,.shop-grid::-webkit-scrollbar-track,.const-body::-webkit-scrollbar-track{background:transparent}
</style>

// ROLL
// ═══════════════════════════════════════════════════════════
function rollWeightedRarity() {
  pityRare++; pityLeg++;
  if (pityLeg >= 80) { pityLeg=0; pityRare=0; return "legendary"; }
  if (pityRare >= 25) { pityRare=0; return "rare"; }
  const bonus = streak >= 5 ? 0.6 : streak >= 3 ? 0.3 : 0;
  const r = Math.random() * 100;
  if (r < 0.4 + bonus*.3)  return "mythic";
  if (r < 1.5 + bonus*.5)  return "cursed";
  if (r < 4   + bonus)     return "legendary";
  if (r < 16  + bonus*2)   return "rare";
  if (r < 46  + bonus)     return "uncommon";
  return "common";
}

function rollName() {
  const rarity = rollWeightedRarity();
  const pool = NAMES[rarity];
  return { name: pool[Math.floor(Math.random() * pool.length)], rarity };
}

function handleRollClick(e) {
  // ripple
  const btn = e.currentTarget;
  const r = document.createElement('div');
  r.className = 'ripple';
  const rect = btn.getBoundingClientRect();
  const sz = Math.max(rect.width, rect.height);
  r.style.cssText = `width:${sz}px;height:${sz}px;left:${e.clientX-rect.left-sz/2}px;top:${e.clientY-rect.top-sz/2}px`;
  btn.appendChild(r);
  setTimeout(() => r.remove(), 550);
  doRoll();
}

function doRoll() {
  if (isRolling) return;
  isRolling = true;

  const el    = document.getElementById('resultName');
  const badge = document.getElementById('rarityBadge');
  const card  = document.getElementById('card');
  const nb    = document.getElementById('newBadge');

  badge.className = 'rarity-badge';
  card.className  = 'card';
  nb.classList.remove('show');

  const names = allNamesFlat();

  // 3-phase deceleration: fast → mid → slow → snap
  let phase = 'fast', ticks = 0;
  const phaseTicks = { fast: 10 + Math.floor(Math.random()*6), mid: 5, slow: 4 };

  el.className = 'result-name spin-fast';
  el.textContent = names[Math.floor(Math.random()*names.length)];

  const ticker = setInterval(() => {
    el.textContent = names[Math.floor(Math.random()*names.length)];
    ticks++;

    if (phase === 'fast' && ticks >= phaseTicks.fast) {
      phase = 'mid'; ticks = 0;
      el.className = 'result-name spin-mid';
    } else if (phase === 'mid' && ticks >= phaseTicks.mid) {
      phase = 'slow'; ticks = 0;
      el.className = 'result-name spin-slow';
    } else if (phase === 'slow' && ticks >= phaseTicks.slow) {
      clearInterval(ticker);
      finalise();
    }
  }, phase === 'fast' ? 55 : 90);

  function finalise() {
    const { name, rarity } = rollName();
    const isNew = !window.collected[name];
    window.collected[name] = rarity;
    window.totalRolls++;

    // history
    window.rollHistory.unshift({ name, rarity });
    if (window.rollHistory.length > 5) window.rollHistory.pop();
    rebuildHistory();

    updateRollCounter();
    checkMilestone(window.totalRolls);

    // streak
    if (rarity === lastRarity && rarity !== 'common') streak++;
    else streak = (rarity !== 'common') ? 1 : 0;
    lastRarity = rarity;
    updateStreakUI(rarity);

    const cfg = RARITY_CONFIG[rarity];
    el.className = `result-name rarity-${rarity} landing`;
    el.textContent = name;

    badge.textContent = cfg.label;
    badge.style.background = cfg.bg;
    badge.style.color = cfg.textColor;
    badge.className = 'rarity-badge visible';
    card.className  = `card rarity-${rarity}`;

    if (isNew) { nb.classList.add('show'); setTimeout(()=>nb.classList.remove('show'), 2600); }

    if (rarity === 'mythic') {
      triggerFlash('mythic-flash');
      spawnParticles(card, 32, ['#ff00ff','#cc00ff','#ff44ff','#8800ff','#ffffff','#ff88ff']);
      toast(`✦ Mythic! ${name}`, 'mythic-toast');
    } else if (rarity === 'legendary') {
      triggerFlash('legendary-flash');
      spawnParticles(card, 24, ['#f0c040','#ff80c0','#80c0ff','#c080ff','#ffffff','#ffd080']);
      if (isNew) toast(`✦ Legendary! ${name}`, 'legendary-toast');
    } else if (rarity === 'cursed') {
      triggerFlash('cursed-flash');
      spawnParticles(card, 16, ['#8b0000','#cc0000','#400000','#ff4444','#660000']);
      toast(`☠ Cursed… ${name}`, 'cursed-toast');
    } else if (rarity === 'rare' && isNew) {
      spawnParticles(card, 10, ['#4080c0','#80b0f0','#c0d8ff']);
    }

    checkConstellations(name);
    setTimeout(() => { isRolling = false; }, 320);
    scheduleSave();
  }
}

function rebuildHistory() {
  const tray = document.getElementById('historyTray');
  tray.innerHTML = '';
  window.rollHistory.forEach((item, i) => {
    const chip = document.createElement('div');
    chip.className = `hist-chip rarity-${item.rarity}`;
    chip.textContent = item.name;
    chip.style.animationDelay = `${i * 30}ms`;
    chip.style.opacity = String(1 - i * 0.15);
    tray.appendChild(chip);
  });
}

// PARTICLES
// ═══════════════════════════════════════════════════════════
function spawnParticles(container, count, colors) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    const sz = 3 + Math.random() * 9;
    const a  = Math.random() * Math.PI * 2;
    const d  = 55 + Math.random() * 140;
    const dur = (0.5 + Math.random() * 0.8).toFixed(2);
    p.style.cssText = `
      width:${sz}px;height:${sz}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      left:calc(50% - ${sz/2}px);top:calc(50% - ${sz/2}px);
      border-radius:${Math.random()>.5?'50%':'2px'};
      --dx:${(Math.cos(a)*d).toFixed(1)}px;--dy:${(Math.sin(a)*d).toFixed(1)}px;
      --dur:${dur}s;
      animation-delay:${(Math.random()*.12).toFixed(2)}s;
    `;
    container.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

function triggerFlash(cls) {
  const el = document.getElementById('flashOverlay');
  el.className = `flash-overlay ${cls}`;
  setTimeout(() => { el.className = 'flash-overlay'; }, 1200);
}

function updateStreakUI(rarity) {
  const row   = document.getElementById('streakRow');
  const bonus = document.getElementById('streakBonus');
  const pips  = document.querySelectorAll('.pip');

  row.classList.add('visible');

  pips.forEach((pip, i) => {
    const wasLit = pip.className.includes('lit-');
    const nowLit = i < streak;
    pip.className = 'pip' + (nowLit ? ` lit-${rarity}` : '');
    if (nowLit && !wasLit) pip.classList.add('popping');
    setTimeout(() => pip.classList.remove('popping'), 350);
  });

  if (streak >= 3) {
    bonus.textContent = streak >= 5 ? '🔥 MAX HEAT — boosted odds!' : `🔥 ×${streak} streak`;
    bonus.style.opacity = '1';
    bonus.style.transform = 'scale(1)';
  } else {
    bonus.style.opacity = '0';
  }
}

function checkMilestone(n) {

    toast(`🎲 ${n} rolls reached!`, 'milestone-toast');
  }
  // unlock notification
  BUTTON_STYLES.forEach(s => {
    if (s.unlockAt > 0 && n === s.unlockAt) {
      setTimeout(() => toast(`🎨 Style unlocked: ${s.name}!`, 'milestone-toast'), 500);
    }
  });
}

// CONSTELLATIONS
// ═══════════════════════════════════════════════════════════
let newlyFoundStars = new Set();

function checkConstellations(newName) {
  newlyFoundStars.add(newName);
  CONSTELLATIONS.forEach(c => {
    if (completedConstellations.has(c.id)) return;
    const allFound = c.names.every(n => window.collected[n]);
    if (allFound) {
      completedConstellations.add(c.id);
      setTimeout(() => toast(`✦ Constellation! ${c.name} — "${c.title}" unlocked`, 'const-toast'), 700);
    }
  });
}

function openConstellation()  { renderConstellation(); document.getElementById('constOverlay').classList.add('open'); }
function closeConstellation() { document.getElementById('constOverlay').classList.remove('open'); }

function renderConstellation() {
  const body = document.getElementById('constBody');
  body.innerHTML = '';
  let complete = 0, titles = [];

  CONSTELLATIONS.forEach(c => {
    const found  = c.names.filter(n => window.collected[n]).length;
    const total  = c.names.length;
    const isDone = found === total;
    if (isDone) { complete++; titles.push(`"${c.title}"`); }

    const g = document.createElement('div');
    g.className = `const-group${isDone ? ' complete' : ''}`;
    g.innerHTML = `
      <div class="const-group-name">${c.name}</div>
      <div class="const-progress-line">${isDone ? '✦ ' + c.title : `${found} / ${total} discovered`}</div>
      <div class="const-mini-bar"><div class="const-mini-fill" style="width:${(found/total*100).toFixed(0)}%"></div></div>
      <div class="const-stars">
        ${c.names.map(n => {
          const f = !!window.collected[n];
          const isNew = newlyFoundStars.has(n);
          return `<div class="const-star${f?' found':''}${f&&isNew?' new-find':''}">${f?n:'???'}</div>`;
        }).join('')}
      </div>
    `;
    body.appendChild(g);
  });

  newlyFoundStars.clear();
  document.getElementById('constProgress').textContent = `${complete} / ${CONSTELLATIONS.length} constellations complete`;
  document.getElementById('constTitles').textContent = titles.length ? titles.join(' · ') : '';
}

function toast(msg, cls='') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast${cls ? ' '+cls : ''}`;
  t.textContent = msg;
  c.appendChild(t);

    t.classList.add('out');
    setTimeout(() => t.remove(), 320);

function setStatus(type, msg) {
  const el = document.getElementById('saveStatus');
  el.textContent = msg;
  el.className = `save-status ${type}`;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveToFirebase, 1800);
}

async function saveToFirebase() {
  if (!window._dbReady) return;
  setStatus('saving', 'Saving…');
  try {
    const ref = window._dbDoc(window._db, 'saves', 'player1');
    await window._dbSetDoc(ref, {
      collected:   window.collected,
      totalRolls:  window.totalRolls,
      activeStyle: window.activeStyle,
      rollHistory: window.rollHistory,
      updatedAt:   new Date().toISOString()
    });
    setStatus('saved', '✓ Saved');
    setTimeout(() => setStatus('', ''), 2500);
  } catch(e) {
    setStatus('error', 'Save failed');
  }
}

function closeBook() { document.getElementById('bookOverlay').classList.remove('open'); }
function flipCover() {
  if (!coverFlipped) { document.getElementById('bookCover').classList.add('opened'); coverFlipped = true; }
}

function switchTab(rarity, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentTab = rarity; currentPage = 0;
  animatePage('right');
}

function getFilteredNames() {
  const rarities = currentTab === 'all'
    ? ['mythic','cursed','legendary','rare','uncommon','common']
    : [currentTab];
  let all = [];
  rarities.forEach(r => {
    if (!NAMES[r]) return;
    NAMES[r].forEach(n => all.push({ name:n, rarity:r, collected:!!window.collected[n] }));
  });
  return all;
}

function renderPage() {
  const names   = getFilteredNames();
  const slice   = names.slice(currentPage * NAMES_PER_PAGE, (currentPage+1) * NAMES_PER_PAGE);
  const content = document.getElementById('pageContent');

  if (!names.length) {
    content.innerHTML = '<div style="text-align:center;padding:48px;color:#bbb;font-size:11px;letter-spacing:.15em;text-transform:uppercase">No names</div>';
    return;
  }

  const groups = {};
  slice.forEach(item => { if (!groups[item.rarity]) groups[item.rarity]=[]; groups[item.rarity].push(item); });

  let html = '';
  ['mythic','cursed','legendary','rare','uncommon','common'].forEach(r => {
    if (!groups[r]) return;
    const cfg = RARITY_CONFIG[r];
    html += `<div class="rarity-section-label" style="color:${cfg.color}">${cfg.label}</div><div class="names-grid">`;
    groups[r].forEach(item => {
      html += `<div class="name-entry ${item.collected ? `collected rarity-${r}` : 'not-collected'}">${item.name}</div>`;
    });
    html += '</div>';
  });

  content.innerHTML = html;
  const cc = Object.keys(window.collected).length;
  const tc = allNamesFlat().length;
  document.getElementById('bookCount').textContent = cc === 0 ? 'No names collected yet' : `${cc} / ${tc} collected`;
  const pages = Math.ceil(names.length / NAMES_PER_PAGE);
  document.getElementById('prevBtn').disabled = currentPage === 0;
  document.getElementById('nextBtn').disabled = currentPage >= pages - 1;
}

function animatePage(dir) {
  const p = document.getElementById('pageContent');
  p.classList.remove('visible');
  p.classList.add(dir === 'right' ? 'exit-left' : 'enter-right');
  setTimeout(() => {
    renderPage();
    p.classList.remove('exit-left','enter-right');
    p.classList.add('enter-right');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      p.classList.remove('enter-right');
      p.classList.add('visible');
    }));
  }, 260);
}

function prevPage() { if (currentPage > 0) { currentPage--; animatePage('left'); } }
function nextPage() {
  const t = getFilteredNames().length;
  if (currentPage < Math.ceil(t / NAMES_PER_PAGE) - 1) { currentPage++; animatePage('right'); }
}

// ═══════════════════════════════════════════════════════════
// SHOP
// ═══════════════════════════════════════════════════════════
function openShop()  { renderShop(); document.getElementById('shopOverlay').classList.add('open'); }
function closeShop() { document.getElementById('shopOverlay').classList.remove('open'); }

function renderShop() {
  document.getElementById('shopRollNum').textContent = window.totalRolls;
  const grid = document.getElementById('shopGrid');
  grid.innerHTML = '';

  BUTTON_STYLES.forEach(style => {
    const unlocked = window.totalRolls >= style.unlockAt;
    const isActive = window.activeStyle === style.id;
    const prog = unlocked ? 100 : Math.min(100, Math.round((window.totalRolls / style.unlockAt) * 100));

    const item = document.createElement('div');
    item.className = `shop-item${unlocked ? '' : ' locked'}${isActive ? ' si-active' : ''}`;
    item.innerHTML = `
      ${!unlocked ? '<div class="lock-icon">🔒</div>' : ''}
      <div class="shop-preview">
        <button class="btn btn-primary ${style.cls}" style="pointer-events:none;font-size:9px;border-radius:3px">${style.id === 'prismatic' ? '&nbsp;' : style.name}</button>
      </div>
      <div class="shop-name">${style.name}</div>
      <div class="shop-desc">${style.desc}</div>
      <div class="shop-footer">
        ${!unlocked
          ? `<div style="flex:1"><div class="shop-req">${style.unlockAt - window.totalRolls} more rolls</div><div class="prog-wrap"><div class="prog-fill" style="width:${prog}%"></div></div></div>`
          : `<div class="shop-req" style="color:#4a7a4a">✓ Unlocked</div>`}
        <button class="shop-btn${isActive ? ' sel' : ''}" ${!unlocked ? 'disabled' : ''} onclick="selectStyle('${style.id}')">
          ${isActive ? 'Active' : 'Select'}
        </button>
      </div>
    `;
    grid.appendChild(item);
  });
}

function selectStyle(id) {
  window.activeStyle = id;
  updateButtonStyle();
  renderShop();
  scheduleSave();
}

// init idle pulse on card
setTimeout(() => {
  const c = document.getElementById('card');
  if (c.className === 'card idle-pulse') {} // already set
}, 100);
</script>
