<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f0f">
  <title>ARDY RNG</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="starfield"></div>
<canvas id="particle-canvas"></canvas>

<div id="app">

  <!-- Header -->
  <header id="header">
    <div id="logo">ARDY · RNG</div>
    <div id="stats-bar">
      <div class="stat-chip">ROLLS <span id="stat-rolls">0</span></div>
      <div class="stat-chip">BEST <span id="stat-streak">0</span></div>
      <div class="stat-chip"><span id="stat-collected">0</span><span style="color:#333">/700</span></div>
    </div>
  </header>

  <!-- XP Bar -->
  <div id="xp-area">
    <div class="xp-labels">
      <span id="xp-label-l">LV 1</span>
      <span id="xp-label-r">0 / 100 XP</span>
    </div>
    <div id="xp-bar-wrap">
      <div id="xp-bar" style="width:0%"></div>
    </div>
  </div>

  <!-- Pity Bar -->
  <div id="pity-area">
    <span id="pity-label">PITY</span>
    <div id="pity-bar-wrap">
      <div id="pity-bar" style="width:0%"></div>
    </div>
    <span id="pity-val">0/90</span>
  </div>

  <!-- Roll Stage -->
  <div id="roll-stage">
    <div id="rarity-card">
      <div id="card-shine"></div>
      <div id="card-badges"></div>
      <span id="card-id">#000</span>
      <span id="card-icon">—</span>
      <div id="card-tier">—</div>
      <div id="card-name">Roll to begin</div>
      <div id="card-desc">700 unique rarities await. Press ROLL and discover your fate.</div>
    </div>
  </div>

  <!-- Roll Button -->
  <div id="roll-wrap">
    <button id="roll-btn">
      <span class="btn-text">ROLL</span>
    </button>
    <div class="roll-meta">
      <div id="roll-counter">TOTAL <span>0</span></div>
      <button id="auto-roll-btn">AUTO</button>
    </div>
  </div>

  <!-- History -->
  <div id="history-strip"></div>

</div>

<!-- Cutscene -->
<div id="cutscene">
  <div id="cs-beams"></div>
  <div id="cutscene-inner">
    <span id="cs-icon">⭐</span>
    <div id="cs-tier-label">LEGENDARY</div>
    <div id="cs-name">—</div>
    <div id="cs-desc">—</div>
    <div id="cs-hint">TAP TO CONTINUE</div>
  </div>
</div>

<!-- Level Up Banner -->
<div id="levelup-banner">LEVEL UP</div>

<!-- Streak Indicator -->
<div id="streak-indicator">0 STREAK</div>

<!-- Multiplier Badge -->
<div id="multiplier-badge">2× XP</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Collection Button -->
<button id="collection-btn" title="Collection">
  ▦
  <span id="coll-count">0</span>
</button>

<!-- Stats Button -->
<button id="stats-btn" title="Statistics">
  ◈
</button>

<!-- Collection Drawer -->
<div id="collection-drawer">
  <div id="drawer-header">
    <h2>COLLECTION</h2>
    <button id="drawer-close">✕</button>
  </div>
  <div id="drawer-filters"></div>
  <div id="coll-stats"></div>
  <div id="coll-grid"></div>
</div>

<!-- Stats Drawer -->
<div id="stats-drawer">
  <div id="drawer-header" style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);">
    <h2 style="font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:4px;color:var(--text-mid);text-transform:uppercase;">STATISTICS</h2>
    <button id="stats-close" style="width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-lo);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
  </div>
  <div id="stats-content"></div>
</div>

<script src="rarities.js"></script>
<script src="game.js"></script>
</body>
</html>
